name: Release

on:
  push:
    tags: ["v*"]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Tag matches manifest versions
        run: |
          sh scripts/bump-version.sh --check
          TAG="${GITHUB_REF_NAME#v}"
          MANIFEST=$(node -p 'require("./create-dream-team/package.json").version')
          if [ "$TAG" != "$MANIFEST" ]; then
            echo "Tag v$TAG does not match manifest version $MANIFEST" >&2
            exit 1
          fi

      - name: Templates in sync
        run: sh scripts/sync-templates.sh --check

      - name: Publish create-dream-team to npm
        working-directory: create-dream-team
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
